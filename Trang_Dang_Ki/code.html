<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Tạo tài khoản - CowColap</title>
    
    <!-- Tải thư viện Tailwind CSS[cite: 8] -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <!-- Tải font chữ và bộ icon từ Google[cite: 8] -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL,GRAD,opsz@300,0,0,24&display=block" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Cấu hình màu sắc tùy chỉnh cho Tailwind (Theme Đen Trắng) -->
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            blue: '#000000',        
                            blueHover: '#333333',   
                            link: '#000000',        
                            icon: '#000000',        
                            bg: '#F8FAFC',          
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[url('baico.jpg')] bg-cover bg-center bg-fixed min-h-screen flex flex-col font-sans text-gray-800 antialiased relative overflow-hidden">

    <!-- KHUNG CANVAS LÀM NỀN ĐỘNG -->
    <canvas id="cowCanvas" class="absolute inset-0 w-full h-full z-0 pointer-events-none"></canvas>

    <!-- Header chứa Logo -->
    <header class="absolute top-0 left-0 w-full p-6 md:p-10 z-20">
        <img src="Gemini_Generated_Image_lua62klua62klua6.png" alt="CowColap Logo" class="h-12 w-auto object-contain rounded-full shadow-sm border border-black/10">
    </header>

    <!-- Nội dung chính (Khung Đăng ký) -->
    <main class="flex-grow flex items-center justify-center p-4 z-10 relative">
        
        <!-- Form Container: Glassmorphism -->
        <div class="bg-white/30 backdrop-blur-xl rounded-2xl shadow-2xl border border-white/50 w-full max-w-[440px] p-8 md:p-10 mt-16 md:mt-0">
            
            <div class="text-center mb-8">
                <!-- Tiêu đề[cite: 8] -->
                <h1 class="text-3xl font-bold text-black mb-2">Tạo tài khoản</h1>
                <p class="text-[15px] font-medium text-gray-800">Tạo tài khoản mới để tiếp tục</p>
            </div>

            <!-- Form đăng ký[cite: 8] -->
            <form action="#" class="space-y-5" method="POST">
                
                <!-- Email -->
                <div>
                    <label class="block text-sm font-bold text-black mb-1.5" for="email">Email</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-black text-[22px]">mail</span>
                        </div>
                        <input class="w-full pl-11 pr-4 py-2.5 bg-white/70 border-2 border-black focus:border-black focus:ring-0 rounded-lg text-[15px] font-medium transition-colors outline-none placeholder:text-gray-500" id="email" name="email" placeholder="Nhập địa chỉ email" required type="email">
                    </div>
                </div>

                <!-- Mật khẩu -->
                <div>
                    <label class="block text-sm font-bold text-black mb-1.5" for="password">Mật khẩu</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-black text-[22px]">lock</span>
                        </div>
                        <!-- Ô input mật khẩu ẩn/hiện[cite: 8] -->
                        <input class="w-full pl-11 pr-11 py-2.5 bg-white/70 border-2 border-black focus:border-black focus:ring-0 rounded-lg text-[15px] font-medium transition-colors outline-none placeholder:text-gray-500" id="password" name="password" placeholder="Nhập mật khẩu" required type="password">
                        <button type="button" class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-black hover:scale-110 transition-transform">
                            <span class="material-symbols-outlined text-[22px]">visibility</span>
                        </button>
                    </div>
                    <!-- Hướng dẫn mật khẩu[cite: 8] -->
                    <p class="mt-2 text-[12px] font-bold text-black/70">Ít nhất 8 ký tự, gồm chữ hoa, thường & ký tự đặc biệt.</p>
                </div>

                <!-- Nhập lại mật khẩu[cite: 8] -->
                <div>
                    <label class="block text-sm font-bold text-black mb-1.5" for="confirm-password">Nhập lại mật khẩu</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-black text-[22px]">lock</span>
                        </div>
                        <input class="w-full pl-11 pr-11 py-2.5 bg-white/70 border-2 border-black focus:border-black focus:ring-0 rounded-lg text-[15px] font-medium transition-colors outline-none placeholder:text-gray-500" id="confirm-password" name="confirm-password" placeholder="Nhập lại mật khẩu" required type="password">
                        <button type="button" class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-black hover:scale-110 transition-transform">
                            <span class="material-symbols-outlined text-[22px]">visibility</span>
                        </button>
                    </div>
                </div>

                <!-- Nút Đăng ký[cite: 8] -->
                <div class="pt-4">
                    <button class="w-full bg-white text-black border-2 border-black font-extrabold text-[16px] py-3 px-4 rounded-lg flex items-center justify-center gap-2 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:shadow-[0px_0px_0px_0px_rgba(0,0,0,1)] hover:translate-y-[4px] hover:translate-x-[4px] transition-all" type="submit">
                        <span>Đăng ký</span>
                        <span class="material-symbols-outlined text-[24px]">pets</span>
                    </button>
                </div>
            </form>

            <!-- Đường kẻ Hoặc[cite: 8] -->
            <div class="flex items-center my-7">
                <div class="flex-grow border-t-2 border-black/20"></div>
                <span class="flex-shrink-0 px-3 text-[13px] font-bold text-black/60">Hoặc</span>
                <div class="flex-grow border-t-2 border-black/20"></div>
            </div>

            <!-- Chuyển hướng Đăng nhập[cite: 8] -->
            <div class="text-center text-[14px] font-medium text-black">
                Đã có tài khoản? 
                <a class="font-bold text-black hover:underline underline-offset-2 transition-colors" href="#">Đăng nhập ngay</a>
            </div>

        </div>
    </main>

    <!-- Chân trang (Footer) -->
    <footer class="w-full border-t border-white/40 bg-white/30 backdrop-blur-md py-5 px-6 md:px-10 flex flex-col md:flex-row justify-between items-center gap-4 text-[13px] font-bold text-black relative z-10">
        <div class="flex items-center gap-3">
            <img src="Gemini_Generated_Image_lua62klua62klua6.png" alt="CowColap Logo" class="h-6 w-auto object-contain rounded-full">
            <span>© 2026 CowColap. Tất cả quyền được bảo lưu.</span>
        </div>
        
        <div class="flex gap-6">
            <a href="#" class="hover:underline underline-offset-2">Điều khoản</a>
            <a href="#" class="hover:underline underline-offset-2">Bảo mật</a>
            <a href="#" class="hover:underline underline-offset-2">Liên hệ</a>
        </div>
    </footer>

    <!-- JAVASCRIPT: HIỆU ỨNG ĐÀN BÒ -->
    <script>
        const canvas = document.getElementById('cowCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const cowImg = new Image();
        cowImg.src = 'cow.png'; 

        let mouse = { x: null, y: null, radius: 180 };

        window.addEventListener('mousemove', function(event) {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        window.addEventListener('mouseout', function() {
            mouse.x = undefined;
            mouse.y = undefined;
        });

        window.addEventListener('resize', function() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        });

        class Cow {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = 40; 
                this.velocityX = (Math.random() - 0.5) * 1.5;
                this.velocityY = (Math.random() - 0.5) * 1.5;
                this.mass = 1.2;
            }

            draw() {
                if(cowImg.complete) {
                    ctx.drawImage(cowImg, this.x - this.size/2, this.y - this.size/2, this.size, this.size);
                }
            }

            update() {
                this.x += this.velocityX;
                this.y += this.velocityY;

                if (this.x > canvas.width || this.x < 0) this.velocityX *= -1;
                if (this.y > canvas.height || this.y < 0) this.velocityY *= -1;

                if (mouse.x !== undefined && mouse.y !== undefined) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < mouse.radius) {
                        let forceDirectionX = dx / distance;
                        let forceDirectionY = dy / distance;
                        let force = (mouse.radius - distance) / mouse.radius;
                        
                        let directionX = forceDirectionX * force * this.mass;
                        let directionY = forceDirectionY * force * this.mass;

                        this.x -= directionX * 6; 
                        this.y -= directionY * 6;
                    }
                }
                this.draw();
            }
        }

        let cowArray = [];

        function init() {
            cowArray = [];
            let numberOfCows = 60; 
            for (let i = 0; i < numberOfCows; i++) {
                let x = Math.random() * canvas.width;
                let y = Math.random() * canvas.height;
                cowArray.push(new Cow(x, y));
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < cowArray.length; i++) {
                cowArray[i].update();
            }
        }

        cowImg.onload = () => {
            init();
            animate();
        };
    </script>
</body>
</html>
